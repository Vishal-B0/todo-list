<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo List</title>
 <link rel="stylesheet" href="{{ url_for('static', filename='STYLE.css') }}">

<style>

</style>
</head>
<body>

<div class="main">
    <h1>To-Do List</h1>


    <form class="todo-form" action="{{ url_for('todo') }}" method="POST">
        <input id="todoinput" type="text" placeholder="Enter task" name="todowork">
        <input type="datetime-local" name="task-time">

        <button type="submit">Add Task</button>
    </form>


    {% for task in tasks %}
    <div class="taskstore">

        <form action="{{ url_for('delete_task', task_id=task.id) }}" method="POST">

            <input type="checkbox" class="removebutton" onchange="this.form.submit()">
        </form>
        <p>{{ task.work }}</p>
        <p>{{ task.time}}</p>

    </div>
    {% endfor %}
</div>

</body>
</html>
