<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='STYLE.css') }}">
</head>
<body>
    <div class="main">
        <form class="todo-form" action="{{ url_for('todo') }}" method="POST">
            <h1>📝 My Tasks</h1>
            <input id="todoinput"
                   type="text"
                   placeholder="Enter a task..."
                   name="todowork"
                   required>
            <input type="datetime-local" name="task-time">
            <button type="submit">Add Task</button>
        </form>
        {% for task in tasks %}
        <div class="taskstore">
            <form action="{{ url_for('delete_task', task_id=task.id) }}"
                  method="POST">
                <input type="checkbox"
                       class="removebutton"
                       onchange="this.form.submit()">
            </form>
            <div class="task-content">
                <p class="task-text">{{ task.work }}</p>
                <small>{{ task.time }}</small>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
